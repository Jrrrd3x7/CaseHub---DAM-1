<body>
    <script src="../js/menus_desplegables.js"></script>
    <!-- Botón volver al inicio -->
    <section>
        <button class="form">
            <a class="return" href="events.html"><i class="bi bi-arrow-left-circle"></i> Volver</a>
        </button>
    </section>
    <section>
        <form action="#" method="post" autocomplete="on">
            <fieldset>
                <legend>Crear Evento de Fundas</legend>

                <label for="nom">Nombre</label><br>
                <input type="text" id="nom" name="nom" placeholder="Release funda Galaxy" required minlength="5">
                <br><br>

                <label for="tipus">Tipo</label><br>
                <select id="tipus" name="tipus" required>
                    <option value="">-- Selecciona --</option>
                    <option>Release nueva Funda</option>
                    <option>Colaboracion</option>
                    <option>Meet & Greet</option>
                    <option>Test de resistència</option>
                    <option>Workshop</option>
                    <option>Showroom</option>
                    <option>Concurso de Diseño</option>
                </select>
                <br><br>

                <label for="descripcio">Descripcion</label><br>
                <textarea id="descripcio" name="descripcio" required minlength="10"
                    placeholder="Explica el Evento"></textarea>
                <br><br>

                <label for="data">Fecha</label><br>
                <input type="date" id="data" name="data" required>
                <br><br>

                <label for="places">Lugares Disponibles</label><br>
                <input type="number" id="places" name="places" required min="1" max="500">
                <br><br>

                <button type="submit">Crear Evento</button>

            </fieldset>
        </form>
    </section>
</body>
