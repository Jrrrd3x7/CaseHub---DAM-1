    <!-- Formulario de login -->
    <section class="form">
        <div>
            <form id="loginForm" action="../php/login.php" method ="POST">
                <fieldset>
                    <legend><i class="bi bi-person"></i> Iniciar Sesión </legend>
                    <br>
                    <div>
                        <!-- Email -->
                        <input type="email" id="email" placeholder="Email" required minlength="10" maxlength="30">
                        <span class="feedback">Email incorrecto</span>
                        <br><br>
    
                        <!-- Contraseña -->
                        <input type="password" id="password" placeholder="Contraseña" required minlength="8" maxlength="20" pattern=".*[A-Z].*[0-9].*" title="La Contraseña debe contener al menos una Mayúscula y un Número">
                        <span class="feedback">Contraseña incorrecta</span>
                        <br><br>
    
                        <!-- Checkbox -->
                        <input type="checkbox" id="remember">
                        <label for="remember">Mantener Inicio de Sesion</label>
                        <br><br>
    
                        <!-- Boton -->
                        <button type="submit">Iniciar Sesión</button>
                    </div>
                </fieldset>
            </form>
        </div>
    </section>
