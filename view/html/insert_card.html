<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/forms.css">
    <title>CaseHUB Insert Card</title>
</head>
<body>
    <div class="background"></div>
    <div class="login-container">
        <img src="../assets/imagenes/logo.png" alt="CaseHUB Logo" class="logo">
        <h2>Datos de la Tarjeta</h2>
        <form>
            <div class="input-group">
                <label class="input-label">Número de tarjeta</label>
                <input type="text" maxlength="19" placeholder="1234 5678 9012 3456" required>
            </div>
            <div class="input-group">
                <label class="input-label">Fecha de expiración</label>
                <input type="date" required>
            </div>
            <div class="input-group">
                <label class="input-label">CVV</label>
                <input type="password" maxlength="3" placeholder="***" required>
            </div>
            <button type="submit" class="btn">Confirmar Pago</button>
            <p class="register">¿Quieres volver? <a href="#">Volver al carrito</a></p>
        </form>
    </div>
</body>
</html>
